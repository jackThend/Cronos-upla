<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos UPLA - Autenticación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        
        <!-- Formulario de Login -->
        <div class="auth-card" id="loginCard">
            <h2 class="auth-title">Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Correo Electrónico</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="********">
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
            <div class="auth-toggle">
                ¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div class="auth-card hidden" id="registerCard">
            <h2 class="auth-title">Registro de Usuario</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regRut">RUT (Sin puntos, con guión)</label>
                    <input type="text" id="regRut" class="form-control" required placeholder="12345678-9" maxlength="12">
                </div>
                <div class="form-group">
                    <label for="regNombre">Nombre Completo</label>
                    <input type="text" id="regNombre" class="form-control" required placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="regEmail">Correo Electrónico</label>
                    <input type="email" id="regEmail" class="form-control" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" class="form-control" required placeholder="********">
                </div>
                <div class="form-group">
                    <label for="reg-perfil">Perfil</label>
                    <select id="reg-perfil" class="form-control" required>
                        <option value="1">Docente</option>
                        <option value="2">Estudiante</option>
                    </select>
                </div>
                <button type="submit" class="btn">Crear Cuenta</button>
            </form>
            <div class="auth-toggle">
                ¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
